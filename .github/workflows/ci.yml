name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python 3.12: torch / numba (via darts[torch]) publish no cp314 wheels,
      # and dowhy+numba squeeze numpy into a narrow window — 3.12 has wheels for
      # the whole stack, so the install resolves without source builds.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with fl extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[fl]'

      - name: Verify dependency resolution
        run: pip check

      - name: Run tests
        run: pytest -q
